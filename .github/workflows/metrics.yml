name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]   # daily, UTC 00:00
  workflow_dispatch:                   # allow manual trigger
  push: { branches: ["main"] }

permissions:
  contents: write

# One job, sequential steps — avoids concurrent commits racing on the repo.
# Every step below needs ONLY secrets.METRICS_TOKEN (a classic PAT, repo + read:org).
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # 1) Overview: header + isometric commit calendar
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SeiKasahara
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Australia/Perth
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 2) Coding habits (active hours / working-pattern fingerprint)
      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SeiKasahara
          base: ""
          config_timezone: Australia/Perth
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      # 3) Languages (recency-weighted — what I'm writing now)
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SeiKasahara
          base: ""
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used

      # 4) Interests: favourite topics + recently starred + which emoji I overuse
      - name: Interests
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-interests.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SeiKasahara
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12
          plugin_stars: yes
          plugin_stars_limit: 2
          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_details: percentage

      # 5) 3D skyline of my contributions (animated GIF — on theme)
      - name: Skyline
        uses: lowlighter/metrics@latest
        with:
          filename: github.skyline.gif
          token: ${{ secrets.METRICS_TOKEN }}
          user: SeiKasahara
          base: ""
          plugin_skyline: yes
          plugin_skyline_year: current-year
          plugin_skyline_frames: 60

      # ---------------------------------------------------------------------
      # OPTIONAL personal panels — each needs an extra account/secret.
      # Uncomment a block, add the secret/var, then uncomment its <img> in README.
      # ---------------------------------------------------------------------

      # AniList anime/manga shelf — set ANILIST_USER (repo variable). No token needed for public lists.
      # - name: Anime
      #   uses: lowlighter/metrics@latest
      #   with:
      #     filename: github-metrics-anime.svg
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     user: SeiKasahara
      #     base: ""
      #     plugin_anilist: yes
      #     plugin_anilist_user: ${{ vars.ANILIST_USER }}
      #     plugin_anilist_medias: anime, manga
      #     plugin_anilist_sections: favorites, characters
      #     plugin_anilist_limit: 2

      # Now-playing / top tracks — needs a music provider token (Spotify/Last.fm/Apple).
      # Spotify: set MUSIC_TOKEN secret (see metrics docs: Spotify refresh-token flow).
      # - name: Music
      #   uses: lowlighter/metrics@latest
      #   with:
      #     filename: github-metrics-music.svg
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     user: SeiKasahara
      #     base: ""
      #     plugin_music: yes
      #     plugin_music_provider: spotify
